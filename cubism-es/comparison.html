<!DOCTYPE html>
<meta charset="utf-8">
<style>
  body {
    font-family: "Helvetica Neue", Helvetica, sans-serif;
    margin: 30px auto;
    width: 960px;
  }

  #demo {
    position: relative;
  }

  .axis {
    font: 10px sans-serif;
    pointer-events: none;
  }

  .axis path {
    display: none;
  }

  .axis line {
    stroke: #000;
    shape-rendering: crispEdges;
  }

  .comparison {
    border-top: solid 1px #000;
    border-bottom: solid 1px #000;
    overflow: hidden;
    position: relative;
  }

  .comparison + .comparison {
    border-top: none;
  }

  .comparison canvas {
    display: block;
  }

  .comparison .title,
  .comparison .value {
    bottom: 0;
    line-height: 28px;
    margin: 0 6px;
    position: absolute;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
    white-space: nowrap;
  }

  .comparison .title {
    left: 0;
  }

  .comparison .value.primary {
    right: 56px;
  }

  .comparison .value.change {
    right: 0;
    min-width: 48px;
    text-align: right;
  }

  .line {
    background: #000;
    z-index: 2;
  }

  .positive {
    color: #22723a;
  }

  .negative {
    color: #b30000;
  }
</style>

<script src="lib/d3.v7.min.js" charset="utf-8"></script>
<script src="./cubism-ng.standalone.js"></script>

<body>
  <h1>Comparison Demo</h1>
  <div id="demo"></div>

  <script>
    const context = cubism.context().serverDelay(0).clientDelay(0).step(1e3).size(960);

    d3.select('#demo')
      .selectAll('.axis')
      .data(['top', 'bottom'])
      .enter()
      .append('div')
      .attr('class', (d) => d + ' axis')
      .each(function (d) {
        context.axis().ticks(8).orient(d).render(d3.select(this));
      });

    const rows = d3
      .select('#demo')
      .selectAll('.comparison')
      .data([
        { name: 'alpha vs beta', baseA: 24, ampA: 7, baseB: 21, ampB: 5, phase: 0.0 },
        { name: 'gamma vs delta', baseA: 18, ampA: 4, baseB: 20, ampB: 3, phase: 1.6 },
      ])
      .enter()
      .append('div')
      .attr('class', 'comparison')
      .datum((d) => [makeMetric(d, true), makeMetric(d, false), d.name]);

    context
      .comparison()
      .height(36)
      .primary((d) => d[0])
      .secondary((d) => d[1])
      .title((d) => d[2])
      .formatPrimary(d3.format('.2f'))
      .formatChange(d3.format('+.1%'))
      .render(rows);

    const rule = d3.select('#demo').append('div').attr('class', 'rule').attr('id', 'rule');
    context.rule().render(rule);

    context.on('focus', function (i) {
      d3.selectAll('.value').style('right', i == null ? null : context.size() - i + 'px');
    });

    function makeMetric(config, isPrimary) {
      const base = isPrimary ? config.baseA : config.baseB;
      const amp = isPrimary ? config.ampA : config.ampB;
      const phase = config.phase + (isPrimary ? 0 : 0.7);
      return context.metric(function (start, stop, step, callback) {
        start = +start;
        stop = +stop;
        const values = [];
        for (let t = start; t < stop; t += step) {
          const x = t / step;
          values.push(base + amp * Math.sin(x / 14 + phase) + 0.8 * Math.cos(x / 6 + phase));
        }
        callback(null, values);
      }, (isPrimary ? 'P ' : 'S ') + config.name);
    }
  </script>
</body>
